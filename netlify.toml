[build]
  base      = "."
  command   = "npm install -g pnpm@11 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build:netlify-fn && pnpm --filter @workspace/sundarkand run build"
  publish   = "artifacts/sundarkand/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "11"
  # PORT and BASE_PATH are required by vite.config.ts at build time
  PORT      = "5000"
  BASE_PATH = "/"
  # Bypass the pnpm minimumReleaseAge workspace setting on CI
  # (packages in the lockfile are already vetted; this only affects fresh resolves)
  NPM_FLAGS = "--legacy-peer-deps"

# Proxy /api/* to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Local dev via `netlify dev`
[dev]
  command      = "pnpm --filter @workspace/sundarkand run dev"
  targetPort   = 5000
  port         = 8888
  publish      = "artifacts/sundarkand/dist/public"
  autoLaunch   = false
